name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: assetsvc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d assetsvc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/assetsvc
      MONGO_URL: mongodb://127.0.0.1:27017
      MONGO_DB_NAME: assetsvc
      JWT_SECRET: ci-secret-with-at-least-thirty-two-characters
      TOKEN_TTL_SECONDS: 3600
      CORS_ORIGIN: "*"
      ENABLE_RATE_LIMIT: "false"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run seed
      - run: npm run build
      - run: npm test
      - run: npm audit
